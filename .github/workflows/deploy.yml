name: Deploy Olympiad Laravel to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy changed files by FTP with lftp
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 2
          set net:reconnect-interval-base 5

          mirror -R ./ ./ \
            --verbose \
            --only-newer \
            --parallel=2 \
            --exclude-glob .git/** \
            --exclude-glob .git* \
            --exclude-glob .github/** \
            --exclude-glob **/.env \
            --exclude-glob **/.env.* \
            --exclude-glob **/node_modules/** \
            --exclude-glob laravel/.env \
            --exclude-glob laravel/vendor/** \
            --exclude-glob laravel/storage/** \
            --exclude-glob laravel/bootstrap/cache/*.php \
            --exclude-glob **/*.sql \
            --exclude-glob **/*.sql.gz \
            --exclude-glob **/*.zip \
            --exclude-glob **/*.tar \
            --exclude-glob **/*.tar.gz \
            --exclude-glob **/composer-setup.php \
            --exclude-glob **/composer.phar

          bye
          EOF